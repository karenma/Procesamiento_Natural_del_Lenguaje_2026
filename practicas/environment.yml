name: nlp_curso_2026

channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  # Python
  - python=3.10.12

  # Jupyter
  - jupyterlab>=4.0
  - ipykernel>=6.29
  - ipywidgets>=8.1

  # NLP clásico
  - nltk>=3.8
  - spacy>=3.7
  - gensim>=4.3

  # Machine Learning
  - scikit-learn>=1.4
  - imbalanced-learn>=0.11

  # Deep Learning
  - pytorch>=2.1
  - torchvision>=0.16
  - cpuonly  # Eliminalo si tienes GPU NVIDIA

  # Data
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.11

  # Visualización
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.18

  # Utilidades
  - tqdm>=4.66
  - requests>=2.31
  - python-dotenv>=1.0

  # PDF / Archivos
  - pypdf>=3.17

  # Via pip (no disponibles en conda-forge)
  - pip
  - pip:
    - transformers>=4.38
    - datasets>=2.17
    - tokenizers>=0.15
    - evaluate>=0.4
    - accelerate>=0.27
    - sentence-transformers>=2.5
    - huggingface-hub>=0.21
    - fastapi>=0.110
    - uvicorn>=0.27
    - gradio>=4.19
    - python-multipart>=0.0.9
    - pydantic>=2.6
    - wordcloud>=1.9
    - contractions>=0.1
